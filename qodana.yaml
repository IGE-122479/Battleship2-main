version: "1.0"

linter: jetbrains/qodana-jvm:2024.3

profile:
  path: .qodana/long-method-thresholds.xml

include:
  - name: MethodLength
  - name: CyclomaticComplexity
  - name: OverlyNestedMethod
  - name: MethodWithTooManyLocals

exclude:
  - name: All
    paths:
      - "**/*Test*.java"
      - "**/test/**"
      - "**/tests/**"

failureConditions:
  severityThresholds:
    any: 1
