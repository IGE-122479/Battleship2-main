version: "1.0"

linter: jetbrains/qodana-jvm:latest

profile:
  name: brain-method-quality-gate

include:
  - name: MethodLength
  - name: CyclomaticComplexity
  - name: OverlyNestedMethod
  - name: MethodWithTooManyLocals

exclude:
  - name: All
    paths:
      - "**/*Test*.java"
      - "**/test/**"
      - "**/tests/**"

inspectionParameters:
  MethodLength:
    maxLength: 65
  CyclomaticComplexity:
    threshold: 5
  OverlyNestedMethod:
    nestingDepth: 3
  MethodWithTooManyLocals:
    maxCount: 5

failureConditions:
  severityThresholds:
    any: 1
