# ============================================================
# Aluno: 99328 Vicu Mindru
#
# Cheiro no Código: Feature Envy (Martin Fowler)
# Definição: Um método que usa mais features de outra classe
#            do que da sua própria classe.
#
# Limiares utilizados:
#   - ATFD (Access To Foreign Data) > FEW
#     Limiar: 4
#     Significado: O método acede a dados de outras classes
#     mais de 4 vezes — indica dependência excessiva de
#     dados externos.
#
#   - LAA (Locality of Attribute Accesses) < ONE THIRD
#     Limiar: 0.33
#     Significado: Menos de 1/3 dos acessos a atributos são
#     da própria classe — o método "vive" mais noutra classe
#     do que na sua.
#
#   - FDP (Foreign Data Providers) <= FEW
#     Limiar: 4
#     Significado: Os dados externos acedidos estão
#     concentrados em poucas classes — confirma que o método
#     tem "inveja" de uma classe específica.
#
# Todas as condições devem ser verdadeiras simultaneamente.
# Valores iniciais propostos pelo livro (página 84).
# ============================================================

name: Feature Envy Detection (Qodana)

on:
  push:
    branches:
      - main
      - master
      - feature-envy-detection
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  feature-envy-detection:
    name: Detect Feature Envy
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Qodana configuration
        run: |
          cat > qodana.yaml << 'EOF'
          version: "1.0"
          linter: jetbrains/qodana-jvm:latest

          profile:
            name: empty

          include:
            - name: FeatureEnvy

          exclude:
            - name: All
              paths:
                - src/test
                - test
                - target
                - build
          EOF

      - name: Run Qodana for JVM - Feature Envy Only
        uses: JetBrains/qodana-action@v2024.1
        with:
          args: >
            --profile-path .qodana/feature-envy.xml
            --fail-threshold 0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-feature-envy-report
          path: ${{ runner.temp }}/qodana/results
          retention-days: 30