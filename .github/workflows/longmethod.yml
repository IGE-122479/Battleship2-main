name: Qodana Detecção de Long Method (Lanza & Marinescu)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  long-method-detection:
    name: Detect Long Method
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Create Qodana Override Configuration
        run: |
          cat > qodana.yaml << 'EOF'
          version: "1.0"
          linter: jetbrains/qodana-jvm:latest

          profile:
            path: .qodana/long-method-thresholds.xml

          exclude:
            - name: All
              paths:
                - src/test
                - target
          EOF

      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2024.1
        with:
          args: --fail-threshold,0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-long-method-report
          path: ${{ runner.temp }}/qodana/results
          retention-days: 7
