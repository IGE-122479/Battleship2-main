name: "Long Method – Quality Gate"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  qodana:
    name: "Qodana – Long Method gate"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar qodana.yaml
        run: |
          cat > qodana.yaml << 'EOF'
          version: "1.0"
          linter: jetbrains/qodana-jvm
          profile:
            name: empty
          include:
            - name: MethodTooLong
            - name: OverlyComplexMethod
          failThreshold: 0
          EOF

      - name: Run Qodana for JVM
        uses: JetBrains/qodana-action@v2024.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          upload-result: true
          post-pr-comment: true
