# 113190 Pedro Leite
name: Qodana - Long Parameter List Detection
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create Qodana configuration
        run: |
          cat > qodana.yaml << 'EOF'
          version: "1.0"
          linter: jetbrains/qodana-jvm:latest
          include:
            - name: ParametersPerMethod
              options:
                - key: parameterLimit
                  value: 4
          EOF

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2024.1
        with:
          args: --fail-threshold,0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
