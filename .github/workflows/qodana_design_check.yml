name: Qodana Design Check

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2023.2
        with:
          # Define o portão de qualidade: falha se houver 
          # QUALQUER instância de Data Class (limiar 0)
          args: --fail-threshold,0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
